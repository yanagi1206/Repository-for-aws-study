name: ansible CI/CD

on:
  pull_request:
    paths:
      - 'Terraform/**.tf'
      - 'Terraform/tests/**.tftest.hcl'
      - '.github/workflows/**.yaml'
      - 'ansible/**.yaml'
  push:
    branches:
      - main
    paths:
      - 'Terraform/**.tf'
      - 'Terraform/tests/**.tftest.hcl'
      - '.github/workflows/**.yaml'
      - 'ansible/**.yaml'
  workflow_run:
    workflows:
      - Terraform CI/CD
    types:
      - completed

jobs:
  ansible-check:
    if: github.event.workflow_run.conclusion == 'success' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    outputs:
      ec2_ip: ${{ steps.tf-ec2-ip.outputs.ec2_ip }}

    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - run: terraform version
      - run: terraform init
      - run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: tf-ec2-ip
        run: |
          echo "ec2_ip=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  ansible-build:
      runs-on: ubuntu-latest
      needs: ansible-check

      env:
        EC2_IP: ${{ needs.ansible-check.outputs.ec2_ip }}

      steps:
        - uses: actions/checkout@v5
        - name: Install Ansible
          run: |
            sudo apt update
            sudo apt install -y ansible

        - name: Setup SSH
          run: |
            mkdir -p ~/.ssh
            printf "%s" "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H $EC2_IP >> ~/.ssh/known_hosts

        - name: Wait for SSH
          run: |
            for i in {1..30}; do
              nc -zv $EC2_IP 22 && exit 0
              echo "waiting for ssh..."
              sleep 10
            done
            exit 1

        - name: Create inventory
          run: |
            echo "[web]" > inventory
            echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory

        - name: Run Ansible
          run: |
            ansible-playbook --syntax-check ansible/playbook.yaml
            ansible-playbook ansible/playbook.yaml --check
            ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i inventory ansible/playbook.yaml
